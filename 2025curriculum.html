<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026학년도 교육과정 편제표 관리</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // Lucide 아이콘 대체 SVG 컴포넌트
    const BookOpen = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
        <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
      </svg>
    );

    const CheckCircle = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    );

    const List = ({ className, size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        <line x1="8" y1="6" x2="21" y2="6"/>
        <line x1="8" y1="12" x2="21" y2="12"/>
        <line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/>
        <line x1="3" y1="12" x2="3.01" y2="12"/>
        <line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
    );

    const CurriculumTable = () => {
      const mandatorySubjects = [
        { category: '국어', subject: '공통국어1/공통국어2', credits: 4, y1: '4 / 4', y2: '', y3: '', color: 'bg-yellow-50' },
        { category: '수학', subject: '공통수학1/공통수학2', credits: 4, y1: '4 / 4', y2: '', y3: '', color: 'bg-emerald-50' },
        { category: '영어', subject: '공통영어1/공통영어2', credits: 4, y1: '3 / 4', y2: '', y3: '', color: 'bg-blue-50' },
        { category: '사회', subject: '한국사1/한국사2', credits: 3, y1: '3 / 3', y2: '', y3: '', color: 'bg-orange-50' },
      ];

      return (
        <div className="min-h-screen bg-gray-50 p-8 font-sans">
          <div className="max-w-6xl mx-auto">
            <header className="mb-10 text-center">
              <h1 className="text-3xl font-bold text-gray-800 flex justify-center items-center gap-3">
                <BookOpen className="text-indigo-600" size={32} />
                2026학년도 교육과정 편제표 관리
              </h1>
              <p className="text-gray-500 mt-2">학교 지정 및 학생 선택 과목 이수 현황</p>
            </header>

            <section className="bg-white rounded-xl shadow-lg overflow-hidden mb-8">
              <div className="bg-indigo-600 px-6 py-4 flex justify-between items-center">
                <h2 className="text-white font-semibold flex items-center gap-2">
                  <CheckCircle size={18} /> 학교 지정 과목
                </h2>
                <span className="text-xs text-indigo-100 italic">총 100학점 편성</span>
              </div>
              
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead className="bg-gray-100 text-gray-600 text-sm uppercase">
                    <tr>
                      <th className="px-6 py-3 border-b">교과(군)</th>
                      <th className="px-6 py-3 border-b">세부과목</th>
                      <th className="px-6 py-3 border-b text-center">운영학점</th>
                      <th className="px-6 py-3 border-b text-center">1학년(1/2)</th>
                      <th className="px-6 py-3 border-b text-center">2학년(1/2)</th>
                      <th className="px-6 py-3 border-b text-center">3학년(1/2)</th>
                    </tr>
                  </thead>
                  <tbody>
                    {mandatorySubjects.map((item, idx) => (
                      <tr key={idx} className={`${item.color} hover:bg-opacity-80 transition-colors`}>
                        <td className="px-6 py-4 font-bold border-b text-gray-700">{item.category}</td>
                        <td className="px-6 py-4 border-b text-gray-600">{item.subject}</td>
                        <td className="px-6 py-4 border-b text-center font-medium">{item.credits}</td>
                        <td className="px-6 py-4 border-b text-center text-blue-600 font-semibold">{item.y1}</td>
                        <td className="px-6 py-4 border-b text-center text-gray-400">{item.y2 || '-'}</td>
                        <td className="px-6 py-4 border-b text-center text-gray-400">{item.y3 || '-'}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </section>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-white p-6 rounded-xl shadow-md border-t-4 border-orange-400">
                <h3 className="font-bold text-lg mb-4 flex items-center gap-2 text-gray-700">
                  <List size={18} className="text-orange-500" /> 2학년 학생 선택
                </h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between p-2 bg-orange-50 rounded">
                    <span>동아시아 역사 기행 / 윤리와 사상</span>
                    <span className="font-bold">[택 2]</span>
                  </div>
                  <div className="flex justify-between p-2 bg-orange-50 rounded">
                    <span>미술 감상 / 물리학 / 화학</span>
                    <span className="font-bold">[택 3]</span>
                  </div>
                </div>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-md border-t-4 border-green-400">
                <h3 className="font-bold text-lg mb-4 flex items-center gap-2 text-gray-700">
                  <List size={18} className="text-green-500" /> 3학년 학생 선택
                </h3>
                <div className="space-y-2 text-sm">
                  <div className="flex justify-between p-2 bg-green-50 rounded">
                    <span>주제 탐구 독서 / 매체 디사중화</span>
                    <span className="font-bold">[택 3]</span>
                  </div>
                  <div className="flex justify-between p-2 bg-green-50 rounded">
                    <span>논리와 사고 / 인간과 철학</span>
                    <span className="font-bold">[택 4]</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CurriculumTable />);
  </script>
</body>
</html>
