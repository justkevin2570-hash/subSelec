<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>교육과정 조회</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff8fb1;
            --light-pink: #ffe4e1;
            --bg-color: #fff9fb;
            --accent-pink: #ff6b9d;
            --card-bg: #ffffff;
            --text-main: #4a4a4a;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #888;
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: var(--accent-pink);
        }

        .menu-cards {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .menu-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 22px 24px;
            border-radius: 20px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            background: white;
            border: 2px solid rgba(255, 143, 177, 0.2);
            box-shadow: 0 4px 20px rgba(255, 143, 177, 0.12);
        }

        .menu-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 143, 177, 0.2);
        }

        .menu-card:active {
            transform: scale(0.98);
        }

        .menu-card.purple {
            border: 2px solid rgba(167, 139, 250, 0.3);
            box-shadow: 0 4px 20px rgba(167, 139, 250, 0.12);
        }

        .menu-card.purple:hover {
            box-shadow: 0 8px 30px rgba(167, 139, 250, 0.25);
        }

        .menu-badge {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            flex-shrink: 0;
            background: linear-gradient(135deg, var(--primary-pink), var(--accent-pink));
            color: white;
        }

        .menu-card.purple .menu-badge {
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
        }

        .menu-info {
            flex: 1;
            min-width: 0;
        }

        .menu-label {
            font-size: 19px;
            font-weight: 700;
            color: #333;
            display: block;
        }

        .menu-desc {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
            display: block;
        }

        .menu-arrow {
            font-size: 20px;
            color: #ccc;
            flex-shrink: 0;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #b0b0b0;
            margin-top: 32px;
        }

        @media (max-width: 400px) {
            body {
                padding: 24px 14px;
            }

            .menu-card {
                padding: 18px 20px;
            }

            .menu-badge {
                width: 48px;
                height: 48px;
                font-size: 20px;
                border-radius: 14px;
            }

            .menu-label {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="back-btn">← 돌아가기</a>

    <div class="menu-cards">
        <a href="2025curriculum.html" class="menu-card">
            <div class="menu-badge">2025</div>
            <div class="menu-info">
                <span class="menu-label">2025학년도 신입생 교육과정</span>
                <span class="menu-desc">2025학년도 교육과정 편제표 보기</span>
            </div>
            <span class="menu-arrow">→</span>
        </a>

        <a href="curriculum.html" class="menu-card purple">
            <div class="menu-badge">2026</div>
            <div class="menu-info">
                <span class="menu-label">2026학년도 신입생 교육과정</span>
                <span class="menu-desc">2026학년도 교육과정 편제표 보기</span>
            </div>
            <span class="menu-arrow">→</span>
        </a>
    </div>

    <div class="footer">
        이 페이지는 과목 선택 조사를 위해 제작되었습니다
    </div>
</div>

</body>
</html>
