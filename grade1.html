<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>1차 선택과목 조사 - 1학년</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #ff8fb1;
            --light-pink: #ffe4e1;
            --bg-color: #fff9fb;
            --accent-pink: #ff6b9d;
            --card-bg: #ffffff;
            --text-main: #4a4a4a;
            --text-light: #b0b0b0;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px 16px;
            display: flex;
            justify-content: center;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* 헤더 */
        .header-card {
            background: linear-gradient(135deg, var(--primary-pink), var(--accent-pink));
            border-radius: 20px;
            padding: 32px 24px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 10px 20px rgba(255, 143, 177, 0.2);
            text-align: center;
        }

        .header-card h1 {
            font-size: 24px;
            margin: 0 0 6px 0;
            font-weight: 700;
        }

        .header-card .subtitle {
            font-size: 13px;
            opacity: 0.85;
            word-break: keep-all;
        }

        /* 단계 표시기 */
        .step-indicator {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            padding: 0 20px;
        }

        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.3s;
            background-color: #eee;
            color: #999;
        }

        .step-item.active .step-circle {
            background: linear-gradient(135deg, var(--primary-pink), var(--accent-pink));
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 157, 0.3);
        }

        .step-item.done .step-circle {
            background: linear-gradient(135deg, var(--primary-pink), var(--accent-pink));
            color: white;
        }

        .step-label {
            font-size: 12px;
            font-weight: 500;
            color: #999;
            white-space: nowrap;
        }

        .step-item.active .step-label {
            color: var(--accent-pink);
            font-weight: 700;
        }

        .step-item.done .step-label {
            color: var(--accent-pink);
        }

        .step-line {
            width: 40px;
            height: 2px;
            background-color: #e0e0e0;
            margin: 0 6px;
            flex-shrink: 0;
            align-self: flex-start;
            margin-top: 17px;
        }

        .step-line.done {
            background-color: var(--primary-pink);
        }

        /* 단계 콘텐츠 */
        .step-content {
            display: none;
        }

        .step-content.active {
            display: block;
        }

        /* 문항 카드 */
        .question-card {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 28px 24px;
            margin-bottom: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            border: 1px solid rgba(255, 143, 177, 0.1);
        }

        .question-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 18px;
            color: #333;
            display: flex;
            align-items: center;
        }

        .question-title::before {
            content: '';
            width: 6px;
            height: 18px;
            background-color: var(--primary-pink);
            margin-right: 12px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        /* 입력 필드 */
        input[type="text"] {
            width: 100%;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s;
            font-family: 'Pretendard', sans-serif;
        }

        input[type="text"]:focus {
            border-color: var(--primary-pink);
            background-color: var(--bg-color);
        }

        /* 옵션 디자인 */
        .option-group {
            display: grid;
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            border: 1.5px solid #f0f0f0;
            border-radius: 14px;
            cursor: pointer;
            transition: background-color 0.15s, border-color 0.15s;
            min-height: 52px;
            box-sizing: border-box;
        }

        .option-item:active {
            background-color: var(--light-pink);
            border-color: var(--primary-pink);
        }

        .option-item input {
            accent-color: var(--accent-pink);
            width: 22px;
            height: 22px;
            margin-right: 12px;
            flex-shrink: 0;
            cursor: pointer;
        }

        .option-item span {
            font-size: 16px;
            cursor: pointer;
        }

        .option-item input:checked + span {
            font-weight: 600;
            color: var(--accent-pink);
        }

        /* 섹션 구분 */
        .section-divider {
            color: var(--accent-pink);
            font-weight: 700;
            margin: 8px 0 16px 4px;
            font-size: 17px;
        }

        .notice-red {
            color: #ff5252;
            font-size: 13px;
            margin-bottom: 14px;
            display: block;
            padding-left: 4px;
        }

        /* 네비게이션 버튼 */
        .nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .nav-buttons .btn-prev {
            background: white;
            color: var(--text-main);
            border: 1.5px solid #e0e0e0;
            padding: 16px 20px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            flex: 0 0 auto;
            transition: background-color 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-height: 54px;
        }

        .nav-buttons .btn-prev:active {
            background-color: #f5f5f5;
        }

        .nav-buttons .btn-next {
            background: linear-gradient(to right, var(--primary-pink), var(--accent-pink));
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.3);
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-height: 54px;
        }

        .nav-buttons .btn-next:active {
            opacity: 0.85;
        }

        .nav-buttons .btn-next:disabled {
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
        }

        .nav-buttons .btn-submit {
            background: linear-gradient(to right, var(--primary-pink), var(--accent-pink));
            color: white;
            border: none;
            padding: 16px 24px;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 6px 15px rgba(255, 107, 157, 0.3);
            transition: opacity 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-height: 54px;
        }

        .nav-buttons .btn-submit:active {
            opacity: 0.85;
        }

        .nav-buttons .btn-submit:disabled {
            opacity: 0.4;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 체크박스 최대 초과 메시지 */
        .max-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            transition: transform 0.3s ease;
            pointer-events: none;
        }

        .max-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 400px) {
            body {
                padding: 14px 10px;
            }

            .header-card {
                padding: 24px 18px;
            }

            .header-card h1 {
                font-size: 21px;
            }

            .question-card {
                padding: 22px 16px;
            }

            .option-item {
                padding: 12px 14px;
                min-height: 48px;
            }

            .step-circle {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }

            .step-line {
                width: 30px;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 헤더 -->
    <div class="header-card">
        <h1>🌸 1차 선택과목 조사</h1>
        <p class="subtitle">사회와 과학은 각각 1과목 이상 필수 이수입니다</p>
    </div>

    <!-- 단계 표시기 -->
    <div class="step-indicator" id="stepIndicator">
        <div class="step-item active" data-step="1">
            <div class="step-circle">1</div>
            <span class="step-label">기본정보</span>
        </div>
        <div class="step-line" data-line="1"></div>
        <div class="step-item" data-step="2">
            <div class="step-circle">2</div>
            <span class="step-label">1학기 선택</span>
        </div>
        <div class="step-line" data-line="2"></div>
        <div class="step-item" data-step="3">
            <div class="step-circle">3</div>
            <span class="step-label">2학기 선택</span>
        </div>
    </div>

    <form id="surveyForm" onsubmit="return false;">
        <!-- 1단계: 기본 정보 -->
        <div class="step-content active" id="step1">
            <div class="question-card">
                <div class="question-title">성함</div>
                <input type="text" id="name" placeholder="이름을 입력해 주세요" required>
            </div>
            <div class="question-card">
                <div class="question-title">학번</div>
                <input type="text" id="studentId" placeholder="학번을 입력해 주세요" required>
            </div>
            <div class="nav-buttons">
                <button type="button" class="btn-next" id="btnNext1" disabled onclick="goToStep(2)">다음 단계 →</button>
            </div>
        </div>

        <!-- 2단계: 2학년 1학기 -->
        <div class="step-content" id="step2">
            <div class="section-divider">📅 2학년 1학기 선택</div>
            <div class="question-card">
                <div class="question-title">탐구 과목 [택 2]</div>
                <div class="option-group" data-group="sem1-tamgu">
                    <label class="option-item"><input type="checkbox" value="사회와 문화"><span>사회와 문화</span></label>
                    <label class="option-item"><input type="checkbox" value="동아시아 역사 기행"><span>동아시아 역사 기행</span></label>
                    <label class="option-item"><input type="checkbox" value="윤리와 사상"><span>윤리와 사상</span></label>
                    <label class="option-item"><input type="checkbox" value="한국지리 탐구"><span>한국지리 탐구</span></label>
                    <label class="option-item"><input type="checkbox" value="물리학"><span>물리학</span></label>
                    <label class="option-item"><input type="checkbox" value="화학"><span>화학</span></label>
                    <label class="option-item"><input type="checkbox" value="생명과학"><span>생명과학</span></label>
                    <label class="option-item"><input type="checkbox" value="지구과학"><span>지구과학</span></label>
                </div>
            </div>
            <div class="question-card">
                <div class="question-title">예술 과목 [택 1]</div>
                <div class="option-group" data-group="sem1-art">
                    <label class="option-item"><input type="radio" name="art1" value="미술창작"><span>미술창작</span></label>
                    <label class="option-item"><input type="radio" name="art1" value="음악 연주와 창작"><span>음악 연주와 창작</span></label>
                </div>
            </div>
            <div class="nav-buttons">
                <button type="button" class="btn-prev" onclick="goToStep(1)">← 이전</button>
                <button type="button" class="btn-next" id="btnNext2" disabled onclick="goToStep(3)">다음 단계 →</button>
            </div>
        </div>

        <!-- 3단계: 2학년 2학기 -->
        <div class="step-content" id="step3">
            <div class="section-divider">📅 2학년 2학기 선택</div>
            <div class="question-card">
                <div class="question-title">탐구 과목 1 [택 2]</div>
                <span class="notice-red">! 1학기에 선택한 과목은 중복 선택이 불가합니다</span>
                <div class="option-group" data-group="sem2-tamgu1">
                    <label class="option-item"><input type="checkbox" value="사회와 문화"><span>사회와 문화</span></label>
                    <label class="option-item"><input type="checkbox" value="동아시아 역사 기행"><span>동아시아 역사 기행</span></label>
                    <label class="option-item"><input type="checkbox" value="윤리와 사상"><span>윤리와 사상</span></label>
                    <label class="option-item"><input type="checkbox" value="한국지리 탐구"><span>한국지리 탐구</span></label>
                    <label class="option-item"><input type="checkbox" value="물리학"><span>물리학</span></label>
                    <label class="option-item"><input type="checkbox" value="화학"><span>화학</span></label>
                    <label class="option-item"><input type="checkbox" value="생명과학"><span>생명과학</span></label>
                    <label class="option-item"><input type="checkbox" value="지구과학"><span>지구과학</span></label>
                </div>
            </div>
            <div class="question-card">
                <div class="question-title">탐구 과목 2 [택 1]</div>
                <div class="option-group" data-group="sem2-tamgu2">
                    <label class="option-item"><input type="radio" name="study2" value="사회문화 탐구"><span>사회문화 탐구</span></label>
                    <label class="option-item"><input type="radio" name="study2" value="융합과학 탐구"><span>융합과학 탐구</span></label>
                </div>
            </div>
            <div class="nav-buttons">
                <button type="button" class="btn-prev" onclick="goToStep(2)">← 이전</button>
                <button type="button" class="btn-submit" id="btnSubmit" disabled onclick="handleSubmit()">선택 완료 및 제출하기</button>
            </div>
        </div>
    </form>
</div>

<!-- 토스트 메시지 -->
<div class="max-toast" id="maxToast">최대 2개까지만 선택할 수 있습니다</div>

<script>
    let currentStep = 1;

    function goToStep(step) {
        // 이전 단계로 가는 건 항상 허용
        if (step < currentStep) {
            setStep(step);
            return;
        }
        // 다음 단계는 검증 통과해야
        if (!validateStep(currentStep)) return;
        setStep(step);
    }

    function setStep(step) {
        currentStep = step;
        document.querySelectorAll('.step-content').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + step).classList.add('active');

        // 단계 표시기 업데이트
        document.querySelectorAll('.step-item').forEach((item, i) => {
            const s = i + 1;
            item.classList.remove('active', 'done');
            if (s === step) item.classList.add('active');
            else if (s < step) item.classList.add('done');
        });
        document.querySelectorAll('.step-line').forEach((line, i) => {
            const l = i + 1;
            line.classList.toggle('done', l < step);
        });

        window.scrollTo({ top: 0, behavior: 'smooth' });
        updateButtons();
    }

    function validateStep(step) {
        if (step === 1) {
            const name = document.getElementById('name').value.trim();
            const sid = document.getElementById('studentId').value.trim();
            return name !== '' && sid !== '';
        }
        if (step === 2) {
            const tamgu = document.querySelectorAll('[data-group="sem1-tamgu"] input:checked');
            const art = document.querySelector('input[name="art1"]:checked');
            return tamgu.length === 2 && art !== null;
        }
        if (step === 3) {
            const tamgu1 = document.querySelectorAll('[data-group="sem2-tamgu1"] input:checked');
            const tamgu2 = document.querySelector('input[name="study2"]:checked');
            return tamgu1.length === 2 && tamgu2 !== null;
        }
        return false;
    }

    function updateButtons() {
        if (currentStep === 1) {
            const valid = validateStep(1);
            document.getElementById('btnNext1').disabled = !valid;
        }
        if (currentStep === 2) {
            const valid = validateStep(2);
            document.getElementById('btnNext2').disabled = !valid;
        }
        if (currentStep === 3) {
            const valid = validateStep(3);
            document.getElementById('btnSubmit').disabled = !valid;
        }
    }

    // 최대 선택 개수 제한 (체크박스 그룹)
    function setupMaxSelect(groupSelector, max) {
        const container = document.querySelector(groupSelector);
        if (!container) return;
        container.addEventListener('change', (e) => {
            if (e.target.type !== 'checkbox') return;
            const checked = container.querySelectorAll('input[type="checkbox"]:checked');
            if (checked.length > max) {
                e.target.checked = false;
                showToast('최대 ' + max + '개까지만 선택할 수 있습니다');
            }
            updateButtons();
        });
    }

    function showToast(msg) {
        const toast = document.getElementById('maxToast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('show'), 1500);
    }

    function handleSubmit() {
        if (!validateStep(3)) return;

        const name = document.getElementById('name').value.trim();
        const studentId = document.getElementById('studentId').value.trim();

        const sem1Tamgu = Array.from(document.querySelectorAll('[data-group="sem1-tamgu"] input:checked'))
            .map(el => el.value);
        const sem1Art = document.querySelector('input[name="art1"]:checked')?.value || '';

        const sem2Tamgu1 = Array.from(document.querySelectorAll('[data-group="sem2-tamgu1"] input:checked'))
            .map(el => el.value);
        const sem2Tamgu2 = document.querySelector('input[name="study2"]:checked')?.value || '';

        const summary = [
            '🌸 [제출 내용 확인]',
            '',
            '성함: ' + name,
            '학번: ' + studentId,
            '',
            '📅 2학년 1학기',
            '  탐구: ' + sem1Tamgu.join(', '),
            '  예술: ' + sem1Art,
            '',
            '📅 2학년 2학기',
            '  탐구1: ' + sem2Tamgu1.join(', '),
            '  탐구2: ' + sem2Tamgu2,
            '',
            '제출하시겠습니까?',
        ].join('\n');

        if (confirm(summary)) {
            alert('✅ 제출이 완료되었습니다!');
            // 실제 제출 로직이 필요하면 여기에 추가
        }
    }

    // 실시간 유효성 검사
    document.getElementById('name').addEventListener('input', updateButtons);
    document.getElementById('studentId').addEventListener('input', updateButtons);

    // 체크박스 최대 2개 제한 적용
    setupMaxSelect('[data-group="sem1-tamgu"]', 2);
    setupMaxSelect('[data-group="sem2-tamgu1"]', 2);

    // 라디오 버튼 변경 감지
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', updateButtons);
    });
</script>

</body>
</html>
